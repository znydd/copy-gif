<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copy Gif</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --text: #111111;
      --muted: #444444;
      --accent: #d60000;
      --border: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 360px;
      height: 100vh;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: var(--bg);
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 10px;
    }

    .card {
      width: 100%;
      height: 100%;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 0;
      padding: 18px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 6px 0 14px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    ol {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin-bottom: 10px;
      font-size: 16px;
      line-height: 1.4;
    }

    li strong {
      color: var(--accent);
    }

    .tip {
      margin-top: 12px;
      background: #ffffff;
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 10px;
      color: #111111;
      font-size: 14px;
      line-height: 1.45;
    }

    .brand {
      display: inline-block;
      margin-bottom: 2px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .kbd {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 6px;
      background: #111111;
      border: 1px solid #111111;
      color: #ffffff;
      font-size: 13px;
      vertical-align: middle;
    }

    .accent {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="card">
      <span class="brand">Copy Gif</span>
      <h1>Download GIF in 3 Steps</h1>
      <p class="subtitle">
        Works best on Google image results that show the <span class="accent">GIF</span> badge.
      </p>

      <ol>
        <li><strong>Search</strong> any GIF on Google Images.</li>
        <li><strong>Right-click</strong> the result card or image.</li>
        <li>Choose <span class="kbd">Download gif</span>.</li>
      </ol>

      <p class="tip">
        Tip: If one item fails, try another result. Some providers block direct access links.
      </p>
    </section>
  </main>
</body>

</html>
